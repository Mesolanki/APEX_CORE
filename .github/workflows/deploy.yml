name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust this to your main branch name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            admin/package-lock.json

      - name: Install and Build Frontend 🏗️
        run: |
          cd frontend
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://apex-core-backend.onrender.com' }}

      - name: Install and Build Admin 🏗️
        run: |
          cd admin
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://apex-core-backend.onrender.com' }}

      - name: Prepare Deployment 📦
        run: |
          mkdir -p deploy
          cp -r frontend/dist/* deploy/
          cp deploy/index.html deploy/404.html
          mkdir -p deploy/admin
          cp -r admin/dist/* deploy/admin/
          cp deploy/admin/index.html deploy/admin/404.html

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
